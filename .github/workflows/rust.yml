name: Xodium CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  pages: write
  id-token: write

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    environment:
      name: "${{ github.ref_name }}"
    steps:
      - id: checkout
        name: Checkout
        uses: actions/checkout@v7.0.0
      - id: install_deps
        name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libglib2.0-dev pkg-config

      - id: setup_rust
        name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@d197c158264056996cfba74a9c2d93886346edc3
        with:
          toolchain: stable
          components: rustfmt, clippy

      - id: run_sccache_cache
        name: Run sccache-cache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad

      - id: run_lint
        name: Run Lint
        run: |
          cargo clippy --all-targets --all-features -- -D warnings
          cargo fmt --all -- --check
        shell: bash

  build:
    name: Build
    runs-on: ubuntu-latest
    environment:
      name: "${{ github.ref_name }}"
      url: "${{ steps.upload_artifact.outputs.artifact-url }}"
    outputs:
      VERSION: "${{ steps.get_version.outputs.VERSION }}"
      NAME: "${{ steps.get_name.outputs.NAME }}"
    steps:
      - id: checkout
        name: Checkout
        uses: actions/checkout@v7.0.0
      - id: install_deps
        name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libglib2.0-dev pkg-config

      - id: cache_dependencies
        name: Cache dependencies
        uses: actions/cache@v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - id: setup_rust
        name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@d197c158264056996cfba74a9c2d93886346edc3
        with:
          toolchain: stable

      - id: run_sccache_cache
        name: Run sccache-cache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad

      - id: build_artifact
        name: Build Artefacts
        run: cargo build --release --timings
        shell: bash

      - id: get_name
        name: Get Name
        run: echo "NAME=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].name')" >> $GITHUB_OUTPUT
        shell: bash

      - id: get_version
        name: Get Version
        run: |
          echo "VERSION=$(cargo pkgid | cut -d# -f2 | cut -d: -f2)" >> $GITHUB_OUTPUT
        shell: bash

      - id: upload_tray_artifact
        name: Upload Tray Artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ steps.get_name.outputs.NAME }}-tray-linux-x64
          path: target/release/tray
          retention-days: 7

      - id: upload_toggle_artifact
        name: Upload Toggle Artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ steps.get_name.outputs.NAME }}-toggle-linux-x64
          path: target/release/toggle
          retention-days: 7

  nightly_release:
    name: Nightly Release
    needs: [lint, build]
    runs-on: ubuntu-latest
    environment:
      name: "${{ github.ref_name }}"
    permissions:
      contents: write
    steps:
      - id: checkout
        name: Checkout
        uses: actions/checkout@v7.0.0
      - id: install_deps
        name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libglib2.0-dev pkg-config

      - id: download_artifacts
        name: Download Artefacts
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: "${{ needs.build.outputs.NAME }}-*"
          path: dist/
          merge-multiple: false

      - id: prepare_binaries
        name: Prepare Binaries
        run: |
          mkdir -p release/
          cp dist/${{ needs.build.outputs.NAME }}-tray-linux-x64/tray release/${{ needs.build.outputs.NAME }}-tray
          cp dist/${{ needs.build.outputs.NAME }}-toggle-linux-x64/toggle release/${{ needs.build.outputs.NAME }}-toggle
          chmod +x release/*
        shell: bash

      - id: update_nightly_tag
        name: Update Nightly Tag
        run: |
          gh api repos/${{ github.repository }}/git/refs/tags/nightly \
            --method PATCH \
            --field sha=${{ github.sha }} \
            --field force=true 2>/dev/null || \
          gh api repos/${{ github.repository }}/git/refs \
            --method POST \
            --field ref=refs/tags/nightly \
            --field sha=${{ github.sha }}
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - id: create_nightly_release
        name: Create Nightly Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        with:
          prerelease: true
          files: release/*
          tag_name: nightly
          name: Nightly Build
          body: |
            From commit: ${{ github.sha }}
            Generated on: ${{ github.event.head_commit.timestamp }}

  docs:
    name: Documentation
    needs: [lint, build]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: "${{ steps.deployment.outputs.page_url }}"
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - id: checkout
        name: Checkout
        uses: actions/checkout@v7.0.0
      - id: install_deps
        name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libglib2.0-dev pkg-config

      - id: setup_rust
        name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@d197c158264056996cfba74a9c2d93886346edc3
        with:
          toolchain: stable

      - id: run_sccache_cache
        name: Run sccache-cache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad

      - id: build_docs
        name: Build Documentation
        run: cargo doc --no-deps

      - id: flatten_docs
        name: Flatten Docs
        run: |
          PKG_NAME=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].name')
          cp -r target/doc/${PKG_NAME}/* target/doc/ 2>/dev/null || true
          rm -rf target/doc/${PKG_NAME} 2>/dev/null || true

      - id: upload_artifact
        name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: target/doc/

      - id: deployment
        name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5

  aur-publish:
    name: Publish to AUR
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: aur
    steps:
      - id: checkout
        name: Checkout
        uses: actions/checkout@v7.0.0

      - id: get_version
        name: Get Version
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          fi
          VERSION="${VERSION#v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        shell: bash

      - id: setup_ssh
        name: Setup SSH for AUR
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > ~/.ssh/aur_key
          chmod 600 ~/.ssh/aur_key
          cat >> ~/.ssh/config << 'SSHEOF'
          Host aur.archlinux.org
            HostName aur.archlinux.org
            User aur
            IdentityFile ~/.ssh/aur_key
            StrictHostKeyChecking yes
            UserKnownHostsFile ~/.ssh/aur_known_hosts
          SSHEOF
          ssh-keyscan aur.archlinux.org >> ~/.ssh/aur_known_hosts 2>/dev/null
        shell: bash

      - id: clone_aur
        name: Clone AUR Repository
        run: git clone ssh://aur@aur.archlinux.org/msi-coolerboost.git aur-repo
        shell: bash

      - id: compute_checksum
        name: Compute Source Checksum
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          URL="https://github.com/XodiumSoftware/msi-coolerboost/archive/refs/tags/v${VERSION}.tar.gz"
          curl -sL "$URL" -o source.tar.gz
          SHA256=$(sha256sum source.tar.gz | cut -d' ' -f1)
          echo "SHA256=$SHA256" >> $GITHUB_OUTPUT
          rm source.tar.gz
        shell: bash

      - id: update_pkgbuild
        name: Update PKGBUILD
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          SHA256="${{ steps.compute_checksum.outputs.SHA256 }}"
          cd aur-repo
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          sed -i "s/^sha256sums=.*/sha256sums=('${SHA256}')/" PKGBUILD
          cat PKGBUILD
        shell: bash

      - id: generate_srcinfo
        name: Generate .SRCINFO
        run: |
          cd aur-repo
          if command -v makepkg &> /dev/null; then
            makepkg --printsrcinfo > .SRCINFO
          fi
        shell: bash

      - id: commit_and_push
        name: Commit and Push to AUR
        run: |
          cd aur-repo
          git config user.name "Illyrius"
          git config user.email "28700752+illyrius666@users.noreply.github.com"
          if git diff --exit-code; then
            echo "No changes to push"
            exit 0
          fi
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          git add PKGBUILD .SRCINFO
          git commit -m "Update to ${VERSION}"
          git push origin master
        shell: bash
