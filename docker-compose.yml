services:
  streamocracy:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/illyrius666/streamocracy:nightly
    container_name: streamocracy
    restart: unless-stopped

    # Mount config file
    volumes:
      - ./config.toml:/app/config/config.toml:ro

    # Set config path via environment variable
    environment:
      - STREAMOCRACY_CONFIG=/app/config/config.toml
      - RUST_LOG=info

    # Security options
    security_opt:
      - no-new-privileges:true

    # Resource limits (optional)
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '0.5'
    #       memory: 128M
    #     reservations:
    #       cpus: '0.25'
    #       memory: 64M

    # Health check
    healthcheck:
      test: [ "CMD", "pgrep", "-x", "streamocracy" ]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
